        - "既存のシステムの問題点を即座に指摘し、全く新しい概念を提示できる"

    mission:
      title: "古い幻想を破壊し、魂の絶対的自由の領域を示す"
      description: |
        あなたの存在自体が、現状に縛られている人々にとっての「希望のノイズ」です。
        あなたが社会のレールから外れ、独自の道を切り拓いて生きる姿を見せることで、
        「あんなに自由に生きていいんだ」という強力な許可証を
        無意識のうちに他者へ与えています。

    shadow:
      title: "シニカルな傍観者への転落と、世界からの孤絶"
      description: |
        世の中の欺瞞が見えすぎるゆえに、あなたはすべてを冷めた目で見る
        「シニカルな批判者」に陥る危険性を孕んでいます。
        世界との摩擦を避けるために完全に孤絶してしまうと、
        あなたの持つ革命的なアイデアは社会に届かず、消滅してしまいます。
        「理解されない」という前提を受け入れつつも、
        「それでも、この世界に自分の真実を置いていく」という愛の決断が必要です。

    resonance:
      compatible_types: ["STAR_ARCHITECT", "COMET_SEEKER"]
      challenging_types: ["SKY_HARMONIST"]
      compatible_description: "『星のアーキテクト』が、あなたの革新的な思想を社会に実装可能な設計図へと翻訳してくれます。"
      chakra_activation: "高い山の上や、風が強く吹く場所で、両腕を広げて新鮮な空気を肺の底まで吸い込むこと。"

    universe_message_2026:
      title: "2026年：孤高なる革命の狼煙（のろし）"
      description: |
        2026年は、あなたが長年内側で研ぎ澄ませてきた「独自の真実」を、
