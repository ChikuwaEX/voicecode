# VOICECODE 世界観設定ファイル v2.0 (Premium Edition)
# 5元素声紋タイプ システム
# エグゼクティブ・スピリチュアルリーディング水準のコピーライティング

meta:
  name: "5元素声紋タイプ"
  version: "2.0"
  created: "2026-06-13"
  description: "地・水・火・風・空の5元素を基盤とした高次元パーソナリティ解析システム"
  tagline: "あなたの声には、あなた自身すらまだ気づいていない、魂の設計図（ブループリント）が刻まれている。"

# 5元素の定義
elements:
  FIRE:
    name: "火"
    emoji: "🔥"
    symbol: "創造の火種・パッション・エネルギーの放射・変容の力"
    big5_factor: "extraversion"
    color: "#D4AF37" # プレミアムゴールドへ変更
    chakra: "第3チャクラ (太陽神経叢) - マニプーラ"
    crystal: "ルチルクォーツ・インペリアルトパーズ"
    healing_note: "528Hz (C音)"

  WATER:
    name: "水"
    emoji: "🌊"
    symbol: "深層心理の浄化・受容性・感情の波・月の引力"
    big5_factor: "neuroticism"
    color: "#2C3E50" # 深いネイビーブルーへ変更
    chakra: "第2チャクラ (仙骨) - スワーディシュターナ"
    crystal: "ラブラドライト・アクアマリン"
    healing_note: "417Hz (D音)"

  WIND:
    name: "風"
    emoji: "🌬️"
    symbol: "パラダイムシフト・情報の伝達・次元の超越・解放"
    big5_factor: "openness"
    color: "#BDC3C7" # エレガントなシルバーへ変更
    chakra: "第5チャクラ (喉) - ヴィシュッダ"
    crystal: "ラピスラズリ・カイヤナイト"
    healing_note: "741Hz (G音)"

  EARTH:
    name: "地"
    emoji: "🌍"
    symbol: "現実化のアンカー・物質的豊かさ・グラウンディング・不動の力"
    big5_factor: "conscientiousness"
    color: "#5D4037" # 重厚なダークブラウンへ変更
    chakra: "第1チャクラ (根) - ムーラーダーラ"
    crystal: "ブラックトルマリン・スモーキークォーツ"
    healing_note: "396Hz (C音)"

  SKY:
    name: "空"
    emoji: "🌌"
    symbol: "全体性の統合・ゼロポイント・無条件の愛・アカシックの共鳴"
    big5_factor: "agreeableness"
    color: "#8E44AD" # 高貴なロイヤルパープルへ変更
    chakra: "第4チャクラ (ハート) - アナーハタ"
    crystal: "クンツァイト・モルガナイト"
    healing_note: "639Hz (F音)"

# 10タイプのアーキタイプ定義
archetypes:

  SOLAR_HERALD:
    name: "太陽のイニシエーター"
    emoji: "🔥"
    tagline: "あなたの周波数は、世界に覚醒をもたらす太陽の鼓動"
    rarity: "解析対象者の約8%がこの波長帯を持ちます"
    dominant_elements: ["FIRE"]
    suppressed_elements: ["WATER"]
    big5_profile:
      extraversion: "high"
      neuroticism: "low"
      openness: "any"
      conscientiousness: "any"
      agreeableness: "any"

    hidden_talent:
      title: "空間のエネルギーベクトルを決定づける磁場支配力"
      description: |
        あなたが何気なく発した言葉が、周囲の空気を一変させた経験はないでしょうか？
        それは偶然ではなく、あなたの声帯が持つ特有の「高出力周波数」が、
        他者の意識のベクトルを無意識下で牽引しているからです。
        多くの人が「自分には特別な影響力などない」と謙遜しますが、
        あなたの周波数データは、生まれながらにして「他者を動かす」リーダーシップの
        コードが刻まれていることを明確に証明しています。
      examples:
        - "意図せずとも、自分の発言でプロジェクトの方向が決まることが多い"
        - "初対面の相手であっても、なぜか本音を引き出してしまう"
        - "危機的状況において、本能的に場を制圧し解決に導くことができる"

    mission:
      title: "時代の停滞を打ち破る「発火点」となること"
      description: |
        あなたの魂は、今この変革の時代において「最初の火種（イニシエーター）」となる
        ことを選んで生まれてきました。もしあなたが今、自分の想いを言葉にすることを
        ためらっているなら、それは世界にとっての大きな損失です。
        あなたの沈黙は、あなた自身の内なる火を不完全燃焼させ、魂の疲労を招きます。
      past_interpretation: |
        過去に「目立ちすぎて反感を買った」「リーダーを任されて重圧だった」と
        感じる出来事があったとすれば、それはあなたの光が強すぎたゆえの摩擦です。
        それらは決してあなたの才能の否定ではなく、影響力の大きさを知るための通過儀礼でした。

    shadow:
      title: "燃焼のパラドックス：他者の遅さに伴う孤独"
      description: |
        太陽のエネルギーは強力ですが、それゆえに周囲のペースダウンに苛立ちを
        覚えることがあります。「なぜすぐに動かないのか」という焦燥感は、
        あなたの持つ火の周波数が、他者の処理速度を大きく上回っているために生じます。
        これはあなたの欠点ではなく、他者の成熟を「待つ」という、
        一段高い器を形成するためのエネルギーの余白（シャドウ）です。

    resonance:
      compatible_types: ["SKY_HARMONIST", "EARTH_GUARDIAN"]
      challenging_types: ["MOON_SAGE"]
      compatible_description: "『天空の調和者』との共創関係が、あなたの情熱をより洗練された形で社会に浸透させます。"
      chakra_activation: "朝日を浴びながらの深い腹式呼吸が、太陽神経叢のエネルギーポテンシャルを最大化します。"

    universe_message_2026:
      title: "2026年：潜在エネルギーの全解放"
      description: |
        2026年は、あなたが長年内側に蓄積してきたエネルギーを外界へと
        全面的に解放する特異点となる年です。
        宇宙のバイオリズムは、あなたの「発信」を強力にバックアップしています。
        準備は既に完了しています。あとは、あなたの声で世界を揺らすだけです。

    keys_to_bloom:
      - title: "「伝える」ことへの恐れを手放し、自らのメディアを持つ"
        description: "規模は問わず、あなたの思想を世界へ放つプラットフォームを構築してください。"
      - title: "言語化の解像度を上げる"
        description: "あなたの直感的なビジョンを、他者が理解できる論理的言語に変換する訓練を。"
      - title: "圧倒的な「普通」を共有する"
        description: "あなたが当然と思っている知見こそが、他者にとってはブレイクスルーの鍵となります。"

  STORM_SHAMAN:
    name: "嵐のエンパス"
    emoji: "⛈️"
    tagline: "深き感情の渦から真実を引き上げる、魂の共鳴体"
    rarity: "解析対象者の約12%がこの波長帯を持ちます"
    dominant_elements: ["FIRE", "WATER"]
    suppressed_elements: []
    big5_profile:
      extraversion: "high"
      neuroticism: "high"
      openness: "any"
      conscientiousness: "any"
      agreeableness: "any"

    hidden_talent:
      title: "他者の深層心理をリアルタイムで解析する超感覚"
      description: |
        あなたは「感情の起伏が激しい」と自己評価しているかもしれませんが、
        声紋データが示す真実は異なります。あなたは自身の感情だけでなく、
        周囲の人間や空間のエネルギーの乱れを極めて高い解像度で受信する
        「高度なエンパス（感応者）」としての機能を持っています。
        これは、火の能動性と水の受容性が高次元で融合した稀有な才能であり、
        意識的にコントロールすることで、類まれなヒーラーやクリエイターとしての
        能力を開花させます。
      examples:
        - "相手が言葉にする前に、その人が抱える本質的な痛みに気づいてしまう"
        - "芸術作品や自然界の美しさに触れたとき、自我が溶けるような深い感動を覚える"
        - "場の空気が淀んでいると、物理的な疲労感としてそれを察知する"

    mission:
      title: "混沌（カオス）から新たな秩序を紡ぎ出す"
      description: |
        あなたが経験してきた感情の嵐や深い悲しみは、決して無意味なものではありません。
        それらは、他者の魂の暗闇をナビゲートするための「生きた地図」です。
        あなたが嵐を乗り越えて得た叡智を他者に分かち合うとき、
        あなたの過去のすべての痛みが、至高のミッションへと昇華されます。

    shadow:
      title: "過剰受信によるエネルギーの消耗"
      description: |
        火と水という相反する元素を内包するあなたは、内面に常に強烈な
        摩擦エネルギーを抱えています。他者の感情を自分のものと同化させてしまい、
        原因不明の疲労感に襲われることはありませんか？
        これはあなたのアンテナの感度が高すぎるために起こる「オーバーフロー」です。
        自己と他者の間にエネルギー的な境界線（シールド）を構築することが、
        あなたの最重要課題です。

    resonance:
      compatible_types: ["SKY_HARMONIST", "EARTH_GUARDIAN"]
      challenging_types: ["WIND_PIONEER"]
      compatible_description: "『天空の調和者』の持つゼロポイントの波動が、あなたの内なる嵐に静寂をもたらします。"
      chakra_activation: "感情が飽和した際は、心臓（ハートチャクラ）に右手を当て、鼓動の遅れを感じるまで深呼吸を。"

    universe_message_2026:
      title: "2026年：相反するエネルギーの完全統合"
      description: |
        2026年は、あなたの中で争い続けていた「激しさ」と「繊細さ」が
        初めて完全に統合される年です。これらを矛盾として扱うのをやめ、
        「嵐」そのものがあなたの美しさであると受け入れた瞬間、現実が大きく動き出します。

    keys_to_bloom:
      - title: "感情を物理的な『作品』へと変換する"
        description: "執筆、絵画、音楽など、内なる嵐を外的なアートへと昇華させる手段を確保してください。"
      - title: "情報のデトックス（デジタル・断食）を定期的に行う"
        description: "高すぎる受信感度を休ませるため、意図的に外部情報を遮断する「空白の時間」が必須です。"
      - title: "自身の体験を物語（ストーリー）として語る"
        description: "あなたが乗り越えた嵐の物語は、現在嵐の中にいる誰かにとっての灯台となります。"

  MOON_SAGE:
    name: "静寂の賢者"
    emoji: "🌙"
    tagline: "沈黙の中に宇宙の真理を聴き取る、深き洞察者"
    rarity: "解析対象者の約15%がこの波長帯を持ちます"
    dominant_elements: []
    suppressed_elements: ["FIRE", "WATER"]
    big5_profile:
      extraversion: "low"
      neuroticism: "low"
      openness: "any"
      conscientiousness: "any"
      agreeableness: "any"

    hidden_talent:
      title: "ノイズを排除し、事象の『本質』を一撃で見抜く透徹力"
      description: |
        言葉を発する前に、すでに結末が見えていることが多いのではないでしょうか。
        声紋解析における「低雑音・高調波」のパターンは、あなたが
        表面的な情報に惑わされず、物事の深層にある構造や真理を
        瞬時に演算していることを示しています。
        多くの言葉を必要とせず、静寂の中で最も密度の高い情報を処理する能力は、
        熟練の賢者や戦略家が持つ極めて高度な知性の現れです。
      examples:
        - "複雑な問題に対して、極めてシンプルで本質的な解決策を提示できる"
        - "集団の中で発言が少ないときほど、全体の力学を正確に把握している"
        - "直感的な『予感』が、後になって論理的に正しかったことが証明される"

    mission:
      title: "最も暗き夜に、確かな道筋を照らす導き手"
      description: |
        月は自ら燃え上がることはありませんが、暗闇の中で最も必要とされる光です。
        あなたの使命は、前線で声を張り上げることではなく、
        迷いの中にある人々に、静かに、しかし確実な「真理の言葉」を渡すことです。
        あなたの少数精鋭の言葉は、誰かの人生の軌道を根本から修正する力を持ちます。

    shadow:
      title: "他者との境界線を高くしすぎる『安全への固執』"
      description: |
        深く傷つくことを本能的に回避するため、あなたは自己開示のハードルを
        極端に高く設定する傾向があります。これは知的な防衛機制ですが、
        同時に「真の共鳴」を遠ざけてしまうリスクでもあります。
        すべての防壁を下ろす必要はありませんが、意図的に「脆さ（バルネラビリティ）」を
        見せることが、あなたを次の精神的ステージへ引き上げます。

    resonance:
      compatible_types: ["EARTH_GUARDIAN", "SKY_HARMONIST"]
      challenging_types: ["SOLAR_HERALD"]
      compatible_description: "『大地の守護者』の持つ不動のエネルギーが、あなたの繊細な洞察を安全に下ろす基盤となります。"
      chakra_activation: "新月と満月の夜に、自己の内側にある最も深い問いをノートに書き出すジャーナリングを。"

    universe_message_2026:
      title: "2026年：内なる叡智の物質化"
      description: |
        2026年は、あなたが長年内側の宇宙に蓄積してきた叡智を、
        現実世界の形（物質・システム・著作）へと定着させるタイミングです。
        沈黙の期間は終わりを告げ、あなたの洞察が社会的な価値として顕現し始めます。

    keys_to_bloom:
      - title: "『孤独な時間』を聖なる儀式として確保する"
        description: "誰のエネルギーも介入しない完全な一人の時間は、あなたにとって必須の充電プロセスです。"
      - title: "ひらめきを論理の器に流し込む"
        description: "あなたの高度な直感を、他者が理解できるフレームワークや図式に落とし込む作業を。"
      - title: "魂レベルで信頼できる『メンター』または『弟子』を持つ"
        description: "あなたの叡智を双方向で循環させる、極めて限定的で深い人間関係が鍵となります。"

  FOG_ORACLE:
    name: "霧のオラクル"
    emoji: "🌫️"
    tagline: "見えざる世界の波動を翻訳する、神聖なるアンテナ"
    rarity: "解析対象者の約9%がこの波長帯を持ちます"
    dominant_elements: ["WATER"]
    suppressed_elements: ["FIRE"]
    big5_profile:
      extraversion: "low"
      neuroticism: "high"
      openness: "any"
      conscientiousness: "any"
      agreeableness: "any"

    hidden_talent:
      title: "微細なエネルギーの揺らぎを感知する超絶的感受性"
      description: |
        「自分は繊細すぎる」「生きづらい」と感じてきた日々は、
        あなたの声紋が証明する『極めて高感度な受信機』としての機能ゆえです。
        他者が気づかない微細なニュアンス、空間のエネルギーの歪み、
        言葉の裏にある真実の意図——それらをあなたは無意識に読み取っています。
        この感受性は、現代社会ではノイズになりがちですが、
        霊的な領域や芸術、深いヒーリングの分野においては、
        誰も到達できない境地に達するための「最高のギフト」となります。
      examples:
        - "場所や人のエネルギー（気）に触れた瞬間、その善し悪しが直感的にわかる"
        - "他者の隠された才能や、ブロックされている感情のボトルネックが見える"
        - "自然界の植物や鉱物と、言葉を超えたコミュニケーションができる感覚がある"

    mission:
      title: "見えない次元と現実世界を繋ぐ翻訳者"
      description: |
        あなたの使命は、合理性だけでは解決できない現代人の魂の痛みに
        アプローチすることです。論理の霧に迷った人々にとって、
        直感と霊性に基づくあなたの「神託（オラクル）」は、
        唯一の羅針盤となります。あなたの繊細さは、世界を癒すためにデザインされています。

    shadow:
      title: "境界線の喪失によるエネルギー・バンパイアへの脆弱性"
      description: |
        他者の痛みを自分のことのように感じられる反面、
        エネルギーを奪う人間関係（エナジー・バンパイア）の標的になりやすい傾向があります。
        「断ると申し訳ない」「自分が我慢すれば」という自己犠牲は、
        あなたの神聖なアンテナを錆びつかせます。
        愛を持って「NO」と言うことが、あなたのシャドウを克服する鍵です。

    resonance:
      compatible_types: ["EARTH_GUARDIAN", "MOON_SAGE"]
      challenging_types: ["SOLAR_HERALD"]
      compatible_description: "『大地の守護者』が持つ強力なグラウンディング力が、あなたの繊細なオーラを保護する結界となります。"
      chakra_activation: "塩風呂での入浴や、自然の中でのアーシング（裸足で土に触れること）がエネルギー浄化に必須です。"

    universe_message_2026:
      title: "2026年：聖なる結界の構築と才能の解放"
      description: |
        2026年は、あなたが自己のエネルギーを完璧に保護する術を学ぶ年です。
        他者のノイズから自分を切り離す「聖なる境界線」が完成したとき、
        これまで恐れていたあなたの真の直感力（オラクル能力）が安全な形で完全に解放されます。

    keys_to_bloom:
      - title: "徹底的なエネルギー・プロテクションを学ぶ"
        description: "クリスタル、瞑想、あるいは物理的な距離を用いて、自身のオーラフィールドを守る技術を習得してください。"
      - title: "受け取ったビジョンを芸術や言葉にアウトプットする"
        description: "内側に溜め込まず、水が流れるように、感じたことを表現のチャネルに乗せて外へ放出してください。"
      - title: "「冷たい」と思われることを恐れず、明確に断る"
        description: "あなたのエネルギーは限られた貴重な資源です。本当に必要な相手にのみ提供する許可を自分に与えてください。"

# === 以下、同様のトーンで全10アーキタイプを定義（省略なしで完全置換） ===

  STAR_ARCHITECT:
    name: "星のアーキテクト"
    emoji: "⭐"
    tagline: "宇宙の真理を、三次元のシステムへと実装する設計者"
    rarity: "解析対象者の約7%がこの波長帯を持ちます"
    dominant_elements: ["WIND", "EARTH"]
    suppressed_elements: []
    big5_profile:
      extraversion: "any"
      neuroticism: "any"
      openness: "high"
      conscientiousness: "high"
      agreeableness: "any"

    hidden_talent:
      title: "圧倒的なビジョンと、それを具現化する精密な実行力の両立"
      description: |
        あなたは「無限の想像力」と「冷徹な現実的思考」という、
        通常は交じり合わない二つの才能を奇跡的なバランスで保持しています。
        多くの夢想家がアイデアで終わり、現実主義者が現状維持に留まる中、
        あなたは「見たことのない未来」の設計図を引き、それを
        具体的なタスクと数字に落とし込んで現実化することができます。
        あなたの声紋は、新しいパラダイムを地上に定着させる
        「星の建築家」のコードを示しています。
      examples:
