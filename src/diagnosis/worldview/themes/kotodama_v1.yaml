meta:
  name: "声紋言霊リーディング"
  version: "1.0.0"
  created: "2026-06-22"
  description: "言霊×AI音響分析による声紋パーソナリティ・リーディング。1200年の声明の叡智と現代テクノロジーの融合。"
  tagline: "声は、魂の言霊。"
  philosophy: |
    1200年前、日本の僧侶たちは声に5つの徳を見出した。
    正直・調和・明瞭・充実・到達。
    2026年、AIはその叡智を再発見した。
    声の周波数・リズム・倍音の中に、
    古代の僧侶が知っていた魂の設計図が、確かに刻まれていた。
  disclaimer: |
    本サービスは音声の特徴を分析し、パーソナリティに関する参考情報を
    エンターテインメントとして提供するものであり、科学的な診断・医療行為・
    運命の予測・未来の保証を行うものではありません。

