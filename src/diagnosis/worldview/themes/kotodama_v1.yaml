archetypes:

  # ============================================================
  # 1. GUREN_GUIDE — 紅蓮の導き手（FIRE陽）
  # ============================================================
  GUREN_GUIDE:
    name: "紅蓮"
    reading: "ぐれんのみちびきて"
    emoji: "🔥"
    tagline: "情熱で道を切り拓くリーダー"
    color_name: "紅蓮"
    color_hex: "#C0392B"
    rarity: "100人に8人"
    dominant_elements: ["FIRE", "WIND"]
    suppressed_elements: ["WATER"]
    polarity: "陽"
    big5_profile:
      high: ["外向性", "開放性"]
      low: ["神経症傾向"]
    hidden_talent: |
      あなたの声には、人の心の奥底に眠る「行動の種」に火を灯す
      不思議な熱量が宿っているようです。会議や日常の何気ない会話の中で、
      あなたが発した一言が場の空気を一変させた経験はないでしょうか。
      それは偶然ではなく、あなたの声帯が生み出す倍音パターンが、
      聴く人の交感神経を心地よく刺激する特有の周波数帯を含んでいる
      可能性を示唆しています。多くの人が「自分にはリーダーシップがない」
      と謙遜しますが、あなたの声の波形は「周囲を自然と導く力」を
      まだ使いきれていないことを映し出しているのかもしれません。
      時に内省的な静けさの中にも、太陽のような温もりが同居する
      ——それが、紅蓮の導き手の隠れた才能の傾向です。
    mission: |
      あなたの声が示す方向性は、「最初の一歩を踏み出す人」としての
      在り方のようです。停滞した空気に風穴を開け、まだ誰も歩いていない
      道の先に光があることを、声で伝える——そんな役割に
      自然と引き寄せられる傾向があります。
      もし今、何かを発信することにためらいを感じているなら、
      それはあなたの内なる炎がまだ完全には解放されていないサインかもしれません。
      「伝える」ことへの恐れを少しずつ手放してみてください。
      あなたの言葉を待っている人が、きっとどこかにいます。
      まずは小さな場から——身近な人に、あなたの想いを声にしてみること。
      それが、紅蓮の炎を世界に灯す最初の儀式となるでしょう。
    shadow: |
      あなたの中にある「まだ解放されていない力」は、
      他者のペースを待つという静かな強さです。
      太陽のように力強いエネルギーを持つからこそ、
      周囲が追いつくまでの「間」に居心地の悪さを感じることがあるようです。
      しかし、その焦燥こそが、あなたの器をさらに広げるための
      美しい余白なのかもしれません。不完全な「待つ時間」の中にこそ、
      次の炎の燃料が静かに蓄えられています。
    resonance: |
      あなたと深く共鳴するのは、夜明け前の静寂と、
      焚き火のそばで語り合う親密な時間のようです。
      高い山の稜線を渡る風、真夏の太陽が照りつける広大な大地、
      そして人々が志をもって集う熱気あふれる場所に、
      あなたの声は最も力を発揮する傾向があります。
      紅い石——ルビーやガーネット——を身につけると、
      あなたの内なる炎と外界のエネルギーが
      穏やかに調和する感覚を覚えるかもしれません。
      朝日が昇る瞬間に、ゆっくりと深い呼吸をしてみてください。
      その光の中に、あなた自身の声の原風景が映し出されるでしょう。
    universe_message: |
      あなたの炎は、誰かの夜を照らすために在る。
      燃え尽きることを恐れないで。
      灯した火は、消えたように見えても、
      必ず誰かの心の中で燃え続けている。
      さあ、声を上げて。世界は、あなたの熱を待っている。
    keys_to_bloom: |
      才能を開花させる3つのカギ——
      ひとつめは「声に出す習慣」。毎朝、その日の想いや目標を
      声に出して宣言してみてください。言霊の力があなたの波動を整えます。
      ふたつめは「火のそばで過ごす時間」。キャンドルの灯り、
      焚き火、暖炉——炎のゆらぎがあなたの直感を研ぎ澄まします。
      みっつめは「今週できる小さな一歩」。
      今週中に、あなたが心に秘めている考えをひとつだけ、
      誰か信頼できる人に声で伝えてみてください。
      完璧に言葉にする必要はありません。
      不完全でも声にした瞬間、紅蓮の炎は静かに灯り始めます。

  # ============================================================
  # 2. KOHAKU_SHAMAN — 琥珀の巫覡（FIRE陰）
  # ============================================================
  KOHAKU_SHAMAN:
    name: "琥珀"
    reading: "こはくのふげき"
    emoji: "⛈️"
    tagline: "熱い心で周りを巻き込むエネルギッシュな人"
    color_name: "琥珀"
    color_hex: "#E67E22"
    rarity: "100人に6人"
    dominant_elements: ["FIRE", "WATER"]
    suppressed_elements: ["EARTH"]
    polarity: "陰"
    big5_profile:
      high: ["外向性", "神経症傾向"]
      low: ["誠実性"]
    hidden_talent: |
      あなたの声の波形には、火と水という相反するエネルギーが
      同時に脈打っているような、稀有な二重構造が見られる傾向があります。
      「感情の起伏が激しい」と自分を評してきたかもしれませんが、
      その揺れこそが、あなたの最も深い才能の源泉なのかもしれません。
      他者が気づかない空気の微細な変化——誰かの言葉の裏にある
      本当の感情、場の温度のわずかな揺らぎ——それらを
      あなたは無意識のうちに高い解像度で受信している可能性があります。
      古代の巫覡（シャーマン）たちは、嵐の中にこそ神の声を聴いたと言われます。
      あなたの感情の嵐もまた、真実を聴き取るための聖なるアンテナ。
      まだ気づいていない、深い共感と洞察の力が眠っています。
    mission: |
      あなたの声が示す方向性は、「感情の翻訳者」としての在り方です。
      論理や正論だけでは届かない場所——人の心の奥底にある
      言葉にならない痛みや喜びに、あなたの声は自然と寄り添う
      傾向を持っているようです。
      もしあなたがこれまで経験してきた感情の嵐があるなら、
      それは決して無駄ではなかったのかもしれません。
      嵐を超えた者だけが知る景色を、まだ嵐の渦中にいる誰かに
      伝えること——それがあなたの声に込められた使命の可能性です。
      あなたの体験を物語として語るとき、その声は
      誰かにとっての灯台となり、岸辺への道を照らすでしょう。
    shadow: |
      あなたの中にまだ解放されていない力は、
      「自分と他者の感情を切り分ける」という静かな境界線です。
      高感度なアンテナゆえに、他者の感情を自分のものとして
      引き受けすぎてしまう傾向があるかもしれません。
      しかし、その繊細さは壊れやすさではなく、
      適切な器を得れば無限の深さを持つ泉となります。
      嵐を鎮める必要はありません。嵐のまま、美しいのです。
    resonance: |
      あなたと深く共鳴するのは、雨上がりの虹がかかる瞬間、
      雷鳴が遠くで響く真夏の午後、そして波が岩に砕ける海辺の
      荒々しくも美しい風景のようです。
      琥珀色の光——夕暮れのオレンジ、蜂蜜の温もり、
      秋の紅葉が陽に透ける瞬間——に触れると、
      あなたの内なるエネルギーは穏やかに調和する傾向があります。
      カーネリアンやアンバー（琥珀）の石は、
      あなたの激しさと繊細さを同時に抱きしめてくれるお守りとなるでしょう。
      感情が溢れそうなとき、心臓の上に手を当てて深呼吸を。
      鼓動のリズムが、あなたを静かな中心へと導いてくれます。
    universe_message: |
      あなたの嵐は、破壊ではなく浄化のために在る。
      涙の数だけ、魂は透明になっていく。
      感じすぎることを恐れないで。
      その感受性こそが、世界を変える最も静かな革命。
    keys_to_bloom: |
      才能を開花させる3つのカギ——
      ひとつめは「感情のアウトプット」。日記、絵画、音楽、
      ダンス——どんな形でもいいので、内なる嵐を外へ表現する
      チャネルを持ってください。溜め込まず、流すことが大切です。
      ふたつめは「デジタル・デトックスの時間」。
      高感度なあなたには、意図的に外部情報を遮断する
      「静寂の時間」が不可欠です。週に一度、数時間でも。
      みっつめは「今週できること」として、
      今感じている気持ちを——上手くなくていいので——
      3行だけノートに書いてみてください。
      言葉にした瞬間、琥珀の光が内側から輝き始めるはずです。

  # ============================================================
  # 3. KOGANE_ARCHITECT — 黄金の建築家（EARTH陽）
  # ============================================================
  KOGANE_ARCHITECT:
    name: "黄金"
    reading: "こがねのけんちくか"
    emoji: "🏛️"
    tagline: "夢を形にする実行の人"
    color_name: "黄金"
    color_hex: "#F1C40F"
    rarity: "100人に9人"
    dominant_elements: ["EARTH", "WIND"]
    suppressed_elements: ["WATER"]
    polarity: "陽"
    big5_profile:
      high: ["誠実性", "開放性"]
      low: ["神経症傾向"]
    hidden_talent: |
      あなたの声には、「壮大なビジョン」と「緻密な実行力」という
      通常は交わりにくい二つの力が、黄金の合金のように
      融合している傾向が見られます。
      多くの夢想家がアイデアの段階で止まり、
      多くの実務家が既存の枠の中に留まる中、
      あなたは「まだ見ぬ未来」の設計図を描きながら、
      同時にそれを今日のタスクに落とし込む——そんな稀有な
      二刀流の才能を持っている可能性があります。
      声の倍音構造に安定した低音と、きらめく高音域が
      同居しているとき、それは地の堅実さと風の創造性が
      美しく調和しているサインなのかもしれません。
      あなたが「当たり前」にやっていることの中に、
      他者にとっては驚くべき才能が隠れています。
    mission: |
      あなたの声が示す方向性は、「夢を現実の形に鍛造する者」です。
      空中に漂うアイデアを、地上に根を張る建築物へと変える——
      そのプロセスにおいて、あなたの声は設計図であり、
      同時にハンマーでもあるようです。
      今あなたが温めている構想があるなら、
      それは「いつか」ではなく「今」形にするべきものかもしれません。
      完璧を待つ必要はありません。
      80点の状態で世に問い、世界からのフィードバックで磨き上げる
      ——そのプロセスこそが、黄金の建築家の真骨頂です。
      あなたが築くものは、時を超えて誰かの礎となるでしょう。
    shadow: |
      あなたの中でまだ解放されていない力は、
      「不完全なまま世に出す勇気」かもしれません。
      高い理想と精密な実行力があるからこそ、
      納得のいく完成度に達するまでリリースを先延ばしにする
      傾向が見られることがあります。
      しかし、設計図の美しさに見惚れている間に、
      季節は移ろっていきます。完璧でなくても建ち始めた建物には、
      風が通り、光が差し込む——その不完全さの中にこそ、
      黄金の輝きが宿るのです。
    resonance: |
      あなたと深く共鳴するのは、歴史ある建築物が佇む街並み、
      職人が丹精込めて仕上げた手仕事の道具、
      そして秋の実りが黄金色に輝く収穫の風景です。
      朝の清涼な空気の中で、その日の計画を静かに思い描く時間は、
      あなたの創造力と実行力を同時にチューニングする儀式となるでしょう。
      タイガーアイやシトリンといった黄金色の石は、
      あなたのビジョンを地上に定着させる力を
      穏やかに増幅してくれるかもしれません。
      土に触れること——庭仕事や陶芸——も、
      あなたのグラウンディングを深める大切な時間です。
    universe_message: |
      あなたの手は、夢を現実に変えるためにある。
      設計図は、もう十分に美しい。
      さあ、最初の一石を置きなさい。
      不完全な建築の中にこそ、黄金の光は差し込む。
    keys_to_bloom: |
      才能を開花させる3つのカギ——
      ひとつめは「プロトタイプの精神」。完璧を目指すよりも、
      まず最小限の形を世に出してみてください。
      建物は、建て始めてから初めてわかることがたくさんあります。
      ふたつめは「ビジョンの言語化」。頭の中にある壮大な設計図を、
      他者にも見える形——文章、図表、マニフェスト——に
      落とし込む習慣をつけてください。共有された夢は加速します。
      みっつめは「今週できること」として、
      今温めているアイデアの「目次」だけを紙に書き出してみてください。
      全体像を俯瞰するだけで、最初の一歩が見えてくるはずです。

  # ============================================================
  # 4. SUIGYOKU_TUNER — 翠玉の調律師（SKY陽）
  # ============================================================
  SUIGYOKU_TUNER:
    name: "翠玉"
    reading: "すいぎょくのちょうりつし"
    emoji: "💚"
    tagline: "場をやさしく包み込む調和の人"
    color_name: "翠玉"
    color_hex: "#27AE60"
    rarity: "100人に12人"
    dominant_elements: ["SKY", "FIRE"]
    suppressed_elements: ["WIND"]
    polarity: "陽"
    big5_profile:
      high: ["協調性", "外向性"]
      low: ["開放性"]
    hidden_talent: |
      あなたの声には、不思議な「調律」の力が宿っているようです。
      あなたがいる空間では、なぜか人々の表情が柔らかくなり、
      対立していた意見が自然と歩み寄りを始める——
      そんな経験に心当たりはないでしょうか。
      それは、あなたの声の周波数が、聴く人の心拍リズムと
      穏やかに同期する特性を持っている可能性を示しています。
      音叉が隣の音叉を共鳴させるように、
      あなたの声は周囲の人々の内なるハーモニーを
      静かに呼び覚ます力を持っているのかもしれません。
      「特別なことは何もしていない」とあなたは言うかもしれません。
      しかし、その「ただそこにいる」こと自体が、
      翠玉の調律師にとっては最も深い才能の発露なのです。
    mission: |
      あなたの声が示す方向性は、「場を調和させる者」としての
      在り方のようです。壊れたものを直すのではなく、
      すべてが本来持っている調和の周波数を思い出させる——
      それが、翠玉の調律師に与えられた役割の可能性です。
      大きな声を上げる必要はありません。
      あなたがあなたのままでいること、
      目の前の人に丁寧に耳を傾けること、
      「大丈夫だよ」と微笑むこと——その一つひとつが、
      見えないネットワークを通じて、
      想像以上に遠くまで調和の波紋を広げています。
      まずは、最も身近な人との対話を大切にしてみてください。
    shadow: |
      あなたの中でまだ解放されていない力は、
      「自分自身のための声」を上げることかもしれません。
      他者の調和を優先するあまり、
      自分の本当の望みを後回しにする傾向はないでしょうか。
      調律師もまた、自分自身がチューニングされる時間を必要とします。
      あなたの中にある小さな「わがまま」は、
      決して不協和音ではありません。
      それもまた、美しいハーモニーの一部なのです。
    resonance: |
      あなたと深く共鳴するのは、森の木漏れ日が揺れる昼下がり、
      穏やかな風が吹く高原、そして大切な人たちと
      食卓を囲む温かな時間のようです。
      緑の多い場所——森、公園、植物園——に身を置くと、
